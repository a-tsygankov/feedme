name: PR Mermaid Diagrams (reusable)

# Reusable workflow that generates Mermaid diagrams of PR changes.
# Tool home: https://github.com/a-tsygankov/tools/tree/main/pr-mermaid-diagrams
# Setup:     https://github.com/a-tsygankov/tools/blob/main/pr-mermaid-diagrams/SETUP.md
#
# Modes:
#   - overview (default, auto on PR push): 1-3 diagrams of the whole change
#   - per-file (on-demand via `/diagrams per-file` comment): one diagram per file
#
# Triggers in consumer repos:
#   on:
#     pull_request: { types: [opened, synchronize, reopened] }
#     issue_comment: { types: [created] }
#
# PR comment commands:
#   /diagrams                       → regenerate overview
#   /diagrams per-file              → per-file mode, all files
#   /diagrams path/a.ts path/b.java → per-file mode, just these files
#
# Authentication priority:
#   1. PR_MERMAID_ANTHROPIC_API_KEY  — direct API (recommended, costs ~cents/PR)
#   2. CLAUDE_CODE_OAUTH_TOKEN — Claude Pro/Max subscription (free, token expires)

on:
  workflow_call:
    inputs:
      model:
        description: Claude model to use
        required: false
        type: string
        default: claude-sonnet-4-6
      max_diff_chars:
        description: Truncate total diff beyond this many chars (overview mode)
        required: false
        type: number
        default: 120000
      max_file_diff_chars:
        description: Truncate per-file diff beyond this many chars (per-file mode)
        required: false
        type: number
        default: 40000
      max_files:
        description: Cap on files processed in per-file mode
        required: false
        type: number
        default: 15
    secrets:
      PR_MERMAID_ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    # For comment-triggered runs, proceed only if the comment is on a PR
    # and starts with /diagrams. For pull_request events, always proceed.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/diagrams'))

    steps:
      - name: Verify credentials
        env:
          API_KEY: ${{ secrets.PR_MERMAID_ANTHROPIC_API_KEY }}
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$API_KEY" ] && [ -z "$OAUTH" ]; then
            echo "::error::Neither PR_MERMAID_ANTHROPIC_API_KEY nor CLAUDE_CODE_OAUTH_TOKEN is set."
            exit 1
          fi
          if [ -n "$API_KEY" ]; then
            echo "Using PR_MERMAID_ANTHROPIC_API_KEY (direct API)."
          else
            echo "Using CLAUDE_CODE_OAUTH_TOKEN (Claude subscription)."
          fi

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_PR: ${{ github.event.pull_request.number }}
          PR_NUMBER_COMMENT: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR="$PR_NUMBER_PR"
          else
            PR="$PR_NUMBER_COMMENT"
          fi
          META=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR")
          BASE_SHA=$(echo "$META" | jq -r .base.sha)
          HEAD_SHA=$(echo "$META" | jq -r .head.sha)
          HEAD_REPO=$(echo "$META" | jq -r .head.repo.full_name)
          echo "pr_number=$PR"        >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA"   >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"

      - name: Check out automations repo (a-tsygankov/tools)
        uses: actions/checkout@v4
        with:
          repository: a-tsygankov/tools
          path: automations

      - name: Check out target repo (PR head)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0
          path: target

      - name: Fetch base ref for diff
        working-directory: target
        run: |
          git remote add base "https://github.com/${{ github.repository }}.git" || true
          git fetch --no-tags --depth=1 base "${{ steps.pr.outputs.base_sha }}" || \
            git fetch --no-tags base

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SDK
        working-directory: automations/pr-mermaid-diagrams
        run: npm install @anthropic-ai/sdk@latest

      - name: Generate diagrams
        env:
          PR_MERMAID_ANTHROPIC_API_KEY: ${{ secrets.PR_MERMAID_ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          TARGET_DIR: ${{ github.workspace }}/target
          NODE_PATH: ${{ github.workspace }}/automations/pr-mermaid-diagrams/node_modules
          MODEL: ${{ inputs.model }}
          MAX_DIFF_CHARS: ${{ inputs.max_diff_chars }}
          MAX_FILE_DIFF_CHARS: ${{ inputs.max_file_diff_chars }}
          MAX_FILES: ${{ inputs.max_files }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: node ${{ github.workspace }}/automations/pr-mermaid-diagrams/scripts/generate-pr-diagrams.mjs
