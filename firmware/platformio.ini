; Waveshare ESP32-S3-LCD-1.28 — round 1.28" 240x240 GC9A01 LCD + QMI8658 IMU
; Pin & flag reference comes from the project handoff (handoff.md).
;
; Build envs:
;   esp32-s3-lcd-1_28  → real hardware (GC9A01 driver, 240x240 round)
;   simulator          → Wokwi simulator (ILI9341 — only natively-supported SPI
;                        LCD on Wokwi). Same SPI pins; logic runs identically.
;   native             → host-side unit tests for the pure domain layer.

[common]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
; The Waveshare ESP32-S3-LCD-1.28 ships with an ESP32-S3R8V-style chip
; (eFuse + bootloader probe confirm 8 MB **OPI** PSRAM — AP_3v3 = AP
; Memory APS6408 family, 8 data lines). Despite the handoff doc saying
; "R2" (which would be QSPI), the bootloader's PSRAM ID read returns
; 0xffffff in QIO mode, and `esp_psram` reports "PSRAM chip not found
; or wrong line mode". qio_opi selects bootloader_opi_80m.elf which
; drives PSRAM in OPI mode and matches the chip.
;
; The simulator env overrides this back to qio_qspi because Wokwi's
; emulator can't service OPI flash bus mode and the OPI bootloader
; faults trying to switch into it.
board_build.arduino.memory_type = qio_opi

build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ── TFT_eSPI: configure via build flags so we don't have to edit User_Setup.h ──
    -DUSER_SETUP_LOADED=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    ; CrowPanel 1.28-inch HMI ESP32 Rotary Display pin map (Elecrow).
    ; The hardware is a smart-knob-style device: 1.28" GC9A01 round LCD,
    ; CST816D capacitive touch, rotary encoder, and a 5-LED WS2812 ring
    ; under the bezel. Critical differences from a Waveshare/Spotpear
    ; board: DC=3 (not 8), BL=46 (not 2 — GPIO 2 is the LED-ring power
    ; enable), MISO is unused (LCD is write-only), and **GPIO 1 must
    ; be driven HIGH** to power the LCD's 3.3 V rail — see main.cpp.
    -DTFT_MOSI=11
    -DTFT_MISO=-1
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=3
    -DTFT_RST=14
    -DTFT_BL=46
    -DTFT_BACKLIGHT_ON=HIGH
    -DUSE_HSPI_PORT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -I src

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson@^7.2.0

[env:esp32-s3-lcd-1_28]
extends = common
upload_speed = 921600
; Default board JSON declares the N8 variant (8 MB flash, 8 MB upload max).
; The Waveshare board ships with 16 MB external flash — esptool sees it as
; such — and our partition table extends to 16 MB, so without these the
; bootloader header records 8 MB, every partition past 0x800000 looks
; out-of-range, and the bootloader calls bootloader_reset() in a loop.
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
build_flags =
    ${common.build_flags}
    -DGC9A01_DRIVER=1
    -DSPI_FREQUENCY=80000000

[env:simulator]
extends = common
extra_scripts = post:scripts/merge_simulator_bin.py
; Override real-board OPI PSRAM back to QSPI for Wokwi: the emulator
; can't service OPI flash bus mode, so the OPI bootloader's first
; instructions (which switch flash to OPI) fault and the chip resets
; before printing anything. qio_qspi gives us the QIO bootloader,
; matched by `psramType: "quad"` in diagram.json.
board_build.arduino.memory_type = qio_qspi
; Wokwi's serial monitor is wired to UART0 (GPIO43/44) in diagram.json.
; Common enables USB-CDC-on-boot so the real board can be flashed and
; monitored over USB. On Wokwi that hides every println, so strip both
; flags here and put Serial back on UART0.
build_unflags =
    ${common.build_unflags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_flags =
    ${common.build_flags}
    -UARDUINO_USB_MODE
    -UARDUINO_USB_CDC_ON_BOOT
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DILI9341_DRIVER=1
    -DSIMULATOR=1

; ── Host-side unit tests for the domain layer (pure C++, no Arduino) ──
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -std=gnu++17
    -I src
    -I test
build_src_filter =
    +<domain/>
test_filter = test_domain
